name: Deploy React App to S3

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # 3. Install dependencies (React project folder)
      - name: Install Dependencies
        working-directory: ./singlepage-website
        run: npm install

      # 4. Build React app (FIXED CI ISSUE)
      - name: Build Project
        working-directory: ./singlepage-website
        run: npm run build
        env:
          CI: false

      # 5. Configure AWS (OIDC authentication)
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::654485376127:role/github-actions-role
          aws-region: ap-south-1

      # 6. Deploy to S3
      - name: Upload to S3
        run: |
          aws s3 sync ./singlepage-website/build s3://bucket-for-npm-static-website --delete
